<div class="well notification discord">

	<h4>Discord</h4>

    <div class="form-group">
        <label class="col-lg-2 control-label">Webhook URL <span data-toggle="popover" data-trigger="hover" data-placement="top" data-content="The Discord channel webhook URL (Server Settings &gt; Integrations &gt; Webhooks)" class="help glyphicon glyphicon-question-sign"></span></label>
        <div class="col-lg-10">
            <input type="text" class="form-control webhookUrl" placeholder="https://discord.com/api/webhooks/..." autocomplete="off" />
        </div>
    </div>

    <div class="form-group">
        <div class="col-lg-12 align-right">
            <button type="button" class="btn btn-danger btn-sm remove-notification">Remove</button>
        </div>
    </div>

</div>
